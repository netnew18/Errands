<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Errands</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
}

.container{
width:100%;
max-width:900px;
}

.title{
text-align:center;
color:#fff;
font-size:42px;
font-weight:700;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
border-radius:20px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.card h2{
color:#fff;
margin-bottom:20px;
}

.task{
display:flex;
align-items:center;
padding:14px;
background:rgba(255,255,255,.08);
border-radius:12px;
margin-bottom:12px;
transition:.25s;
}

.task:hover{
transform:translateX(6px);
background:rgba(255,255,255,.15);
}

.task input{
width:22px;
height:22px;
accent-color:#22c55e;
margin-right:12px;
}

.task span{
color:white;
font-size:18px;
}

.task input:checked + span{
text-decoration:line-through;
opacity:.5;
}

.footer{
text-align:center;
color:#cbd5e1;
margin-top:25px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🗓 My Errands</div>

<div class="grid">

<div class="card">
<h2>📅 Today</h2>

<label class="task">
<input type="checkbox">
<span>🥟 Siomai</span>
</label>

<label class="task">
<input type="checkbox">
<span>🏬 Wilcon</span>
</label>

<label class="task">
<input type="checkbox">
<span>🚶 Walking</span>
</label>

<label class="task">
<input type="checkbox">
<span>🛒 Grocery</span>
</label>

<label class="task">
<input type="checkbox">
<span>🏠 Uwi</span>
</label>

</div>

<div class="card">
<h2>🌅 Tomorrow</h2>

<label class="task">
<input type="checkbox">
<span>🥬 Palengke</span>
</label>

<label class="task">
<input type="checkbox">
<span>🏬 Wilcon</span>
</label>

<label class="task">
<input type="checkbox">
<span>🏠 Uwi</span>
</label>

<label class="task">
<input type="checkbox">
<span>🧹 Linis</span>
</label>

<label class="task">
<input type="checkbox">
<span>🥤 Shake</span>
</label>

</div>

</div>

<div class="footer">
Made with ❤️ using GitHub Pages
</div>

</div>

</body>
</html>
